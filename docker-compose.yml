version: '3.8'

services:
  app:
    build: .
    container_name: contest_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
    depends_on:
      - db
    networks:
      - contest_network

  db:
    image: mysql:8.0
    container_name: contest_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-contest_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - contest_network

networks:
  contest_network:
    driver: bridge

volumes:
  db_data:
