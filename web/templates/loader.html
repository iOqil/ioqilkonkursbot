<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }

        .loader {
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="status">
        <div class="loader"></div>
    </div>

    <script>
        function startAuth() {
            const webapp = window.Telegram.WebApp;
            webapp.ready();

            const initData = webapp.initData;
            if (initData) {
                const url = new URL(window.location.href);
                url.searchParams.set('tg_auth', initData);
                window.location.href = url.toString();
            } else {
                document.getElementById('status').innerHTML = "<h2 style='color:#ef4444'>Xato: Telegram orqali kiring!</h2><p style='font-size:12px;color:#64748b'>initData topilmadi.</p>";
            }
        }

        // Wait for the Telegram Script to load
        if (window.Telegram && window.Telegram.WebApp) {
            startAuth();
        } else {
            let attempts = 0;
            const interval = setInterval(() => {
                attempts++;
                if (window.Telegram && window.Telegram.WebApp) {
                    clearInterval(interval);
                    startAuth();
                } else if (attempts > 50) {
                    clearInterval(interval);
                    document.getElementById('status').innerHTML = "<h2 style='color:#ef4444'>Xato: Telegram kutubxonasi yuklanmadi.</h2>";
                }
            }, 100);
        }
    </script>
</body>

</html>
