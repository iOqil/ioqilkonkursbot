{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Welcome, <span id="user-name">Player</span>!</h1>
    <p>Your Current Score:</p>
    <div class="score" id="user-score">0</div>
</div>

<div class="card">
    <h2>🏆 Top 10 Leaderboard</h2>
    <div style="margin-top: 10px;">
        {% for user in top_users %}
        <div
            style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
            <span>{{ loop.index }}. {{ user.first_name }}</span>
            <span style="font-weight: 700;">{{ user.score }} pts</span>
        </div>
        {% endfor %}
    </div>
</div>

<script>
    const user = webapp.initDataUnsafe.user;
    if (user) {
        document.getElementById('user-name').innerText = user.first_name;
    }
</script>
{% endblock %}
